services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      CASHIER_PIN_HASH: "${CASHIER_PIN_HASH:?CASHIER_PIN_HASH is required. Generate one with: go -C backend run ./cmd/coffee-pos auth hash-pin <6-digit-pin>}"
      DATABASE_URL: "postgres://coffee_pos:coffee_pos_dev@postgres:5432/coffee_pos?sslmode=disable"
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Containerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:8080"

  postgres:
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: coffee_pos
      POSTGRES_USER: coffee_pos
      POSTGRES_PASSWORD: coffee_pos_dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee_pos -d coffee_pos"]
      interval: 10s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
